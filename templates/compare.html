<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Compare | SciBench</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; font-family: system-ui, sans-serif; color: #0f172a; }
        /* VIBRANT AMBIENT BACKGROUND */
        .bg-vibrant-ambient { position: fixed; inset: 0; z-index: -2; background: linear-gradient(-45deg, #e0f2fe, #bae6fd, #ddd6fe, #e0f2fe); background-size: 400% 400%; animation: ambientLight 15s ease infinite; }
        @keyframes ambientLight { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .star-pattern { position: fixed; inset: 0; z-index: -1; opacity: 0.5; background-image: radial-gradient(#64748b 1px, transparent 1px); background-size: 40px 40px; }
        
        /* BOLD GLASS CARDS */
        .vibrant-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 2px solid #38bdf8; box-shadow: 0 15px 35px rgba(14, 165, 233, 0.15); transition: 0.3s; }
    </style>
</head>
<body class="p-6 md:p-10 relative">
    <div class="bg-vibrant-ambient"></div><div class="star-pattern"></div>
    <a href="/" class="text-4xl font-black text-indigo-700 mb-8 block w-max hover:scale-105 transition-transform">SCIBENCH</a>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        <aside class="lg:col-span-1 space-y-6">
            <div class="vibrant-glass p-6 rounded-3xl">
                <h3 class="text-indigo-700 font-black uppercase tracking-widest text-sm mb-4">Module Analysis</h3>
                <p class="text-slate-800 font-medium"><strong>Radar Charting:</strong> Dynamically maps the strengths of both architectures to identify specific use-case winners.</p>
            </div>
            <div class="vibrant-glass p-2 rounded-2xl">
                <iframe class="w-full aspect-video rounded-xl" src="https://www.youtube.com/embed/E9O_4MLmBzc" frameborder="0" allowfullscreen></iframe>
            </div>
        </aside>

        <div class="lg:col-span-3">
            <form method="POST" class="vibrant-glass p-8 rounded-3xl mb-8 grid md:grid-cols-2 gap-6">
                <select name="p1" required class="w-full bg-slate-50 p-5 rounded-2xl text-slate-900 font-bold outline-none border-2 border-slate-300 focus:border-indigo-600 transition-all">
                    <option value="" disabled selected>Select Component A...</option>
                    {% for p in parts %}<option value="{{ p.id }}" {% if request.form.get('p1') == p.id|string %}selected{% endif %}>{{ p.name }}</option>{% endfor %}
                </select>
                <select name="p2" required class="w-full bg-slate-50 p-5 rounded-2xl text-slate-900 font-bold outline-none border-2 border-slate-300 focus:border-indigo-600 transition-all">
                    <option value="" disabled selected>Select Component B...</option>
                    {% for p in parts %}<option value="{{ p.id }}" {% if request.form.get('p2') == p.id|string %}selected{% endif %}>{{ p.name }}</option>{% endfor %}
                </select>
                <button type="submit" class="md:col-span-2 bg-indigo-700 py-5 rounded-2xl font-black text-xl text-white hover:bg-indigo-800 shadow-xl transition-colors tracking-widest">GENERATE RADAR COMPARISON</button>
            </form>

            {% if d1 and d2 %}
            <div class="vibrant-glass p-8 rounded-3xl grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                <div class="space-y-6 text-center">
                    <div class="bg-indigo-100 p-6 rounded-2xl border-2 border-indigo-300">
                        <h3 class="text-xl font-black mb-2 text-indigo-900">{{ d1.name }}</h3>
                        <p class="text-4xl font-black text-indigo-700">{{ "{:,}".format(d1.total) }} <span class="text-sm text-slate-600 font-bold block uppercase mt-1">Total Points</span></p>
                    </div>
                    <div class="bg-sky-100 p-6 rounded-2xl border-2 border-sky-300">
                        <h3 class="text-xl font-black mb-2 text-sky-900">{{ d2.name }}</h3>
                        <p class="text-4xl font-black text-sky-700">{{ "{:,}".format(d2.total) }} <span class="text-sm text-slate-600 font-bold block uppercase mt-1">Total Points</span></p>
                    </div>
                </div>
                <div class="bg-white p-4 rounded-2xl border-2 border-slate-200 shadow-inner w-full aspect-square relative"><canvas id="compareChart"></canvas></div>
            </div>

            <script>
                const d1 = {{ d1 | tojson }};
                const d2 = {{ d2 | tojson }};
                new Chart(document.getElementById('compareChart'), {
                    type: 'radar',
                    data: {
                        labels: ['Climate (FP64)', 'Genome (Cache)', 'Physics (CUDA)'],
                        datasets: [
                            { label: d1.name, data: [d1.cli, d1.gen, d1.phy], fill: true, backgroundColor: 'rgba(67, 56, 202, 0.4)', borderColor: 'rgb(67, 56, 202)', pointBackgroundColor: 'rgb(67, 56, 202)' },
                            { label: d2.name, data: [d2.cli, d2.gen, d2.phy], fill: true, backgroundColor: 'rgba(14, 165, 233, 0.4)', borderColor: 'rgb(14, 165, 233)', pointBackgroundColor: 'rgb(14, 165, 233)' }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            </script>
            {% endif %}
        </div>
    </div>
</body>
</html>
