<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Green Compute | SciBench</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; font-family: system-ui, sans-serif; color: #0f172a; }
        .bg-vibrant-ambient { position: fixed; inset: 0; z-index: -2; background: linear-gradient(-45deg, #dcfce7, #86efac, #bbf7d0, #dcfce7); background-size: 400% 400%; animation: ambientLight 15s ease infinite; }
        @keyframes ambientLight { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .star-pattern { position: fixed; inset: 0; z-index: -1; opacity: 0.6; background-image: radial-gradient(#64748b 1px, transparent 1px); background-size: 40px 40px; }
        .vibrant-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 2px solid #16a34a; box-shadow: 0 15px 35px rgba(22, 163, 74, 0.2); }
    </style>
</head>
<body class="p-6 md:p-10 relative">
    <div class="bg-vibrant-ambient"></div><div class="star-pattern"></div>
    <a href="/" class="text-4xl font-black text-green-700 mb-8 block w-max hover:scale-105 transition-transform">SCIBENCH</a>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        <aside class="lg:col-span-1 space-y-6">
            <div class="vibrant-glass p-6 rounded-3xl">
                <h3 class="text-green-700 font-black uppercase tracking-widest text-sm mb-4">Module Analysis</h3>
                <p class="text-slate-800 font-medium">Calculates Points-Per-Watt to identify highly sustainable hardware for modern eco-conscious "Green AI" labs.</p>
            </div>
            <div class="vibrant-glass p-2 rounded-2xl">
                <iframe class="w-full aspect-video rounded-xl" src="https://www.youtube.com/embed/E9O_4MLmBzc" frameborder="0" allowfullscreen></iframe>
            </div>
        </aside>

        <div class="lg:col-span-3">
            <form method="POST" class="vibrant-glass p-8 rounded-[2rem] mb-8 grid md:grid-cols-2 gap-6">
                <select name="cpu" required class="w-full bg-slate-50 p-5 rounded-2xl text-slate-900 font-bold outline-none border-2 border-slate-300 focus:border-green-600">
                    <option value="" disabled selected>Select CPU...</option>
                    {% for c in cpus %}<option value="{{ c.id }}" {% if request.form.get('cpu') == c.id|string %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
                </select>
                <select name="gpu" required class="w-full bg-slate-50 p-5 rounded-2xl text-slate-900 font-bold outline-none border-2 border-slate-300 focus:border-green-600">
                    <option value="" disabled selected>Select GPU...</option>
                    {% for g in gpus %}<option value="{{ g.id }}" {% if request.form.get('gpu') == g.id|string %}selected{% endif %}>{{ g.name }}</option>{% endfor %}
                </select>
                <button type="submit" class="md:col-span-2 bg-green-600 py-5 rounded-2xl font-black text-xl text-white hover:bg-green-700 shadow-xl tracking-widest">CALCULATE EFFICIENCY</button>
            </form>

            {% if data %}
            <div class="vibrant-glass p-10 rounded-3xl grid md:grid-cols-2 gap-8 items-center border-t-8 border-t-green-600">
                <div class="text-center">
                    <h3 class="text-xl font-black mb-4 text-slate-900">{{ data.cn }} <br>+<br> {{ data.gn }}</h3>
                    <p class="text-7xl font-black text-green-600 mb-2">{{ data.eff }}</p>
                    <p class="text-sm text-slate-600 uppercase tracking-widest font-black mb-6">Points Per Watt</p>
                    <div class="bg-red-50 p-4 rounded-2xl border-2 border-red-200 text-sm">
                        <span class="block text-slate-800 uppercase font-black mb-1">Total System Draw</span>
                        <span class="font-black text-red-600 text-2xl">{{ data.watts }}W</span>
                    </div>
                </div>
                <div class="w-full aspect-square relative p-4 bg-white rounded-3xl shadow-inner border-2 border-slate-100">
                    <canvas id="greenChart"></canvas>
                </div>
            </div>

            <script>
                new Chart(document.getElementById('greenChart'), {
                    type: 'doughnut',
                    data: {
                        labels: ['Output Points', 'Wattage Draw'],
                        datasets: [{ data: [{{ data.total }}, {{ data.watts }}], backgroundColor: ['#16a34a', '#dc2626'], borderWidth: 4 }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, cutout: '65%' }
                });
            </script>
            {% endif %}
        </div>
    </div>
</body>
</html>
