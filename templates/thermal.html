<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thermal | SciBench</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; font-family: system-ui, sans-serif; color: #0f172a; }
        .bg-vibrant-ambient { position: fixed; inset: 0; z-index: -2; background: linear-gradient(-45deg, #ffe4e6, #fecdd3, #fda4af, #ffe4e6); background-size: 400% 400%; animation: ambientLight 15s ease infinite; }
        @keyframes ambientLight { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .star-pattern { position: fixed; inset: 0; z-index: -1; opacity: 0.6; background-image: radial-gradient(#64748b 1px, transparent 1px); background-size: 40px 40px; }
        .vibrant-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 2px solid #e11d48; box-shadow: 0 15px 35px rgba(225, 29, 72, 0.2); }
    </style>
</head>
<body class="p-6 md:p-10 relative">
    <div class="bg-vibrant-ambient"></div><div class="star-pattern"></div>
    <a href="/" class="text-4xl font-black text-rose-700 mb-8 block w-max hover:scale-105 transition-transform">SCIBENCH</a>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        <aside class="lg:col-span-1 space-y-6">
            <div class="vibrant-glass p-6 rounded-3xl">
                <h3 class="text-rose-700 font-black uppercase tracking-widest text-sm mb-4">Module Analysis</h3>
                <p class="text-slate-800 font-medium">Accurately predicts Datacenter HVAC cooling costs before labs construct massive server racks.</p>
            </div>
            <div class="vibrant-glass p-2 rounded-2xl">
                <iframe class="w-full aspect-video rounded-xl" src="https://www.youtube.com/embed/E9O_4MLmBzc" frameborder="0" allowfullscreen></iframe>
            </div>
        </aside>

        <div class="lg:col-span-3">
            <form method="POST" class="vibrant-glass p-8 rounded-[2rem] mb-8 grid md:grid-cols-3 gap-6">
                <select name="cpu" required class="bg-slate-50 p-5 rounded-2xl text-slate-900 font-bold border-2 border-slate-300 focus:border-rose-600 outline-none">
                    <option value="" disabled selected>Select Node CPU...</option>
                    {% for c in cpus %}<option value="{{ c.id }}" {% if request.form.get('cpu') == c.id|string %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
                </select>
                <select name="gpu" required class="bg-slate-50 p-5 rounded-2xl text-slate-900 font-bold border-2 border-slate-300 focus:border-rose-600 outline-none">
                    <option value="" disabled selected>Select Node GPU...</option>
                    {% for g in gpus %}<option value="{{ g.id }}" {% if request.form.get('gpu') == g.id|string %}selected{% endif %}>{{ g.name }}</option>{% endfor %}
                </select>
                <input type="number" name="nodes" value="{{ request.form.get('nodes', 1) }}" min="1" class="bg-slate-50 p-5 rounded-2xl text-slate-900 font-bold border-2 border-slate-300 focus:border-rose-600 outline-none" placeholder="Quantity of PCs">
                <button type="submit" class="md:col-span-3 bg-rose-600 py-5 rounded-2xl font-black text-xl text-white hover:bg-rose-700 shadow-xl tracking-widest">CALCULATE THERMODYNAMICS</button>
            </form>

            {% if data %}
            <div class="grid md:grid-cols-3 gap-6">
                <div class="vibrant-glass p-8 rounded-3xl text-center border-t-8 border-t-orange-500">
                    <p class="text-4xl font-black text-orange-600 mb-2">{{ "{:,}".format(data.btu) }}</p>
                    <p class="text-sm text-slate-700 uppercase font-black tracking-widest">Total BTU/hr</p>
                </div>
                <div class="vibrant-glass p-8 rounded-3xl text-center border-t-8 border-t-blue-500">
                    <p class="text-4xl font-black text-blue-600 mb-2">{{ data.ac }}</p>
                    <p class="text-sm text-slate-700 uppercase font-black tracking-widest">A/C Tons Req.</p>
                </div>
                <div class="vibrant-glass p-8 rounded-3xl text-center border-t-8 border-t-rose-600">
                    <p class="text-4xl font-black text-rose-600 mb-2">₹{{ "{:,}".format(data.cost) }}</p>
                    <p class="text-sm text-slate-700 uppercase font-black tracking-widest">Monthly A/C Bill</p>
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
